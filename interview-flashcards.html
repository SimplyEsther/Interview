<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELUS GTLP Interview Prep - Flashcards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #162d3d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: #10b981;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        .header p {
            font-size: 1.1rem;
            color: #6ee7b7;
            opacity: 0.9;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: #8b5cf6;
            border-radius: 3px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }

        .flashcard-wrapper {
            perspective: 1000px;
            margin-bottom: 30px;
            height: 450px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .flashcard-front {
            background: #162d3d;
            border: 2px solid rgba(139, 92, 246, 0.3);
        }

        .flashcard-back {
            background: #162d3d;
            border: 2px solid rgba(139, 92, 246, 0.3);
            transform: rotateY(180deg);
            overflow-y: auto;
        }

        .flashcard-label {
            font-size: 0.85rem;
            color: #a78bfa;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
        }

        .flashcard-question {
            font-size: 2rem;
            font-weight: 700;
            color: #c4b5fd;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .flashcard-answer {
            font-size: 0.95rem;
            color: #d8d8ff;
            line-height: 1.8;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }

        .key-points {
            background: rgba(139, 92, 246, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 3px solid #8b5cf6;
        }

        .key-points-title {
            font-weight: 700;
            color: #a78bfa;
            margin-bottom: 10px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .key-points-list {
            list-style: none;
            font-size: 0.85rem;
            color: #e9d5ff;
        }

        .key-points-list li {
            padding: 6px 0;
            padding-left: 20px;
            position: relative;
        }

        .key-points-list li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: #a78bfa;
            font-weight: bold;
        }

        .delivery-notes {
            background: rgba(139, 92, 246, 0.08);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 3px solid #a78bfa;
        }

        .delivery-notes-title {
            font-weight: 700;
            color: #a78bfa;
            margin-bottom: 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .delivery-notes-text {
            font-size: 0.85rem;
            color: #e9d5ff;
            line-height: 1.6;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            background: transparent;
            border: 2px solid #8b5cf6;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #a78bfa;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
        }

        button:hover {
            background: rgba(139, 92, 246, 0.1);
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button.primary {
            background: #8b5cf6;
            color: #162d3d;
            border-color: #8b5cf6;
        }

        button.primary:hover {
            background: #7c3aed;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
        }

        button.flip-btn {
            background: #10b981;
            color: #162d3d;
            border-color: #10b981;
        }

        button.flip-btn:hover {
            background: #059669;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.6);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .stats {
            text-align: center;
            color: #a78bfa;
            margin-bottom: 20px;
            font-size: 1rem;
            font-weight: 600;
        }

        .flip-hint {
            text-align: center;
            color: #c4b5fd;
            font-size: 0.9rem;
            margin-top: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .footer {
            text-align: center;
            color: #c4b5fd;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .flashcard-wrapper {
                height: 500px;
            }

            .flashcard-front,
            .flashcard-back {
                padding: 25px;
            }

            .flashcard-question {
                font-size: 1.4rem;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ TELUS GTLP Interview Prep</h1>
            <p>8 Flashcards • Security Operations Engineer Track</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="stats">
            <span id="cardCounter">Card 1 of 8</span>
        </div>

        <div class="flashcard-wrapper">
            <div class="flashcard" id="flashcard" onclick="flipCard()">
                <div class="flashcard-front">
                    <div>
                        <div class="flashcard-label">Question</div>
                        <div class="flashcard-question" id="question"></div>
                    </div>
                    <div class="flip-hint">👆 Click to reveal answer</div>
                </div>
                <div class="flashcard-back">
                    <div>
                        <div class="flashcard-label">Answer</div>
                        <div class="flashcard-answer" id="answer"></div>
                        <div class="key-points" id="keyPointsSection">
                            <div class="key-points-title">Key Talking Points</div>
                            <ul class="key-points-list" id="keyPoints"></ul>
                        </div>
                        <div class="delivery-notes" id="deliveryNotesSection">
                            <div class="delivery-notes-title">💡 Delivery Notes</div>
                            <div class="delivery-notes-text" id="deliveryNotes"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="prevBtn" onclick="previousCard()">← Previous</button>
            <button class="flip-btn" id="flipBtn" onclick="flipCard(); event.stopPropagation();">Flip Card</button>
            <button id="nextBtn" onclick="nextCard()">Next →</button>
        </div>

        <div class="footer">
            <p>Week 1: Foundation Questions + Career Vision</p>
            <p style="opacity: 0.7; margin-top: 8px;">Questions 6-8: Future Vision, Mission Statement, What You Bring</p>
        </div>
    </div>

    <script>
        const flashcards = [
            {
                question: "Tell me about yourself",
                answer: "I'm a recent SANS graduate with honors and currently work as a Security Operations Engineer at Oasis, a software startup where I'm building the security culture from the ground up — compliance frameworks, security awareness training, and this quarter, web application pen testing on our products before they ship.\n\nI currently work as a cybersecurity TA, but before that I was the lead cybersecurity instructor for three years at Brock's Cybersecurity Club, where I partnered with the CISO of Microsoft Canada and trained 140+ students. Right now I'm training 200+ Amazon employees for their Security Plus certification.\n\nMy superpower is security awareness training — and here's the proof: at Oasis, we went from zero participation to 93% in Q1, which is exceptional for a distributed team. Whether it's building compliance frameworks, instructing students, or training professionals, security awareness shows up in everything I do.",
                keyPoints: [
                    "SANS grad with honors (credibility + learning mindset)",
                    "Security Operations Engineer at Oasis (SOC + GRC + pentesting)",
                    "Built security culture from ground up (ownership + systems thinking)",
                    "Lead instructor 3 years @ Brock + CISO of Microsoft Canada partnership",
                    "Training 200+ Amazon employees for Security Plus",
                    "93% participation Q1 — proof of superpower"
                ],
                deliveryNotes: "TIMING: ~60–75 seconds. DELIVERY: Conversational — you're telling a story, not reciting. BUILD THE STAGE: Set context at Oasis early. HIGHLIGHT: The 93% stat is your anchor — pause before delivering it. EYE CONTACT: Look at interviewer, don't rush. Let them ask the next question."
            },
            {
                question: "What draws you specifically to TELUS and the GTLP program?",
                answer: "What really drew me to TELUS GTLP was the 9-month rotation structure — specifically Threat Detection & Incident Response, DevSecOps, and Cloud Security. I've been watching the TELUS job board closely, and this is exactly what I need at this stage of my career.\n\nI'm a GSOC and GSEC certified engineer, and most of my experience has been blue team — threat detection and monitoring at Oasis. I have foundational SIEM knowledge from OpenSearch and Elasticsearch, but those are open-source tools. Enterprise tools like Splunk are where I really want to go.\n\nI want deeper hands-on experience with cloud security — AWS and Azure — and understanding how to embed security from the start through DevSecOps. TELUS's approach to scaling security while building real customer impact aligns directly with how I want to develop as a leader.",
                keyPoints: [
                    "9-month rotation model (Threat Detection, DevSecOps, Cloud Security)",
                    "GSOC + GSEC certified (credibility in blue team ops)",
                    "Currently: threat detection + monitoring at Oasis (blue team)",
                    "Current tools: OpenSearch + Elasticsearch (open-source SIEM)",
                    "Goals: Enterprise Splunk, AWS/Azure cloud security, DevSecOps",
                    "TELUS fit: Scale + customer impact + leadership development"
                ],
                deliveryNotes: "TIMING: ~75 seconds. DELIVERY: Start conversationally — 'So what really drew me...' SPECIFICITY: Name the three rotation areas explicitly. HONESTY: Acknowledge open-source vs enterprise gap — it shows self-awareness. ENTHUSIASM: Let genuine excitement about Splunk + cloud come through. CLOSE: End on leadership development."
            },
            {
                question: "Tell me about a time you faced a challenging situation at work (STAR format)",
                answer: "SITUATION:\nWhen I joined Oasis as a Security Engineer, we had zero security infrastructure — no policies, no compliance framework, no training for the distributed team of developers. There was no way to prove to auditors we were security-aware.\n\nTASK:\nBuild a security culture from the ground up — develop policies, evaluate and implement security tools, and create measurable compliance evidence for all employees.\n\nACTION:\n• Developed security policies based on industry standards: email policy, password policy, data retention, and more — creating a documented baseline\n• Evaluated security platforms on 4 criteria: compatibility with our tech stack, cost-effectiveness (startup budget), vendor reputation, and scalability\n• Selected Watchdog Security — met all 4 criteria, centralized compliance monitoring, simplified risk assessments, full visibility into user identities\n• Designed role-based security awareness training: AI security practices for developers, general awareness for all staff — made it mandatory\n• Tracked participation and compliance metrics throughout the quarter\n\nRESULT:\n• Went from 0% to 93% participation in Q1 — exceptional for a distributed team\n• Generated proof of security awareness training\n• Documented all policies and created a compliance evidence package\n• Put the company on track for ISO 27001 compliance\n• All of this in three months.",
                keyPoints: [
                    "Situation: Zero security infrastructure at a distributed startup",
                    "Task: Build full security culture from scratch",
                    "Action: Policies → tool evaluation (4 criteria) → Watchdog → training",
                    "Result: 0% → 93% participation + ISO 27001 compliance track",
                    "Shows end-to-end ownership (policy + tooling + training + measurement)",
                    "Demonstrates systems thinking across GRC, tools, and awareness"
                ],
                deliveryNotes: "TIMING: ~90 seconds. DELIVERY: Build the stage — 'When they brought me on board, we had zero...' PAUSE: Between each STAR section. SLOW DOWN: On the result — let 93% land. SPECIFICITY: Name the 4 evaluation criteria — it shows rigor. CONNECT: Tie to ISO 27001 at the end for enterprise relevance."
            },
            {
                question: "What's one area you want to grow technically?",
                answer: "Right now I'm looking to grow my SIEM and blue team tool stack — specifically Splunk.\n\nI have foundational SIEM knowledge from OpenSearch and Elasticsearch at Oasis, and from LetsDefend and my GSOC training. But Splunk is the enterprise standard I really want to master.\n\nIt's actually one of the things that drew me to TELUS GTLP — Splunk is a core tool in the Threat Detection and Incident Response rotation, which I'm most excited about. I'm not just eager to learn Splunk itself, but to understand how to architect SIEM environments at scale and how detection feeds into security operations at an enterprise level.",
                keyPoints: [
                    "Pick: Splunk (enterprise SIEM standard — TELUS-relevant)",
                    "Foundation: OpenSearch + Elasticsearch at Oasis + LetsDefend + GSOC",
                    "Honest gap: Open-source experience vs enterprise-scale Splunk",
                    "Connect to TELUS: Core tool in Threat Detection rotation",
                    "Bigger vision: Architect SIEM environments + understand detection at scale",
                    "Growth mindset: Skill + strategy, not just tool knowledge"
                ],
                deliveryNotes: "TIMING: ~60 seconds. DELIVERY: Name Splunk clearly and early. PAUSE: After naming it, before explaining why. AUTHENTICITY: Show genuine excitement — this isn't a rehearsed weakness, it's real ambition. GROUND IT: Reference your existing SIEM foundation to show you're not starting from zero. CLOSE: End on the bigger vision (architecting at scale)."
            },
            {
                question: "What's your understanding of TELUS and why you're a fit?",
                answer: "TELUS is Canada's leading telecom company pioneering digital transformation. What attracted me to GTLP is your commitment to building security operations at scale while maintaining compliance — from cloud infrastructure security to threat detection to GRC.\nI've seen firsthand at Oasis how small teams struggle to do this alone. TELUS's scale means I'll work with enterprise-level Splunk, cloud security at scale, and mature compliance frameworks like you're likely operating under.\nThat aligns perfectly with where I want to develop: becoming a Security Operations Engineer who understands the entire security stack from detection through compliance evidence.",
                keyPoints: [
                    "Company context: Telecom leader + digital transformation",
                    "GTLP appeal: Scale + structured rotations + mentorship",
                    "Research shown: Security + compliance + cloud operations",
                    "Your fit: Ready to learn at enterprise scale",
                    "Vision: Security Operations Engineer (SOC → GRC bridge)",
                    "Authentic connection: Small startup → enterprise growth"
                ],
                deliveryNotes: "TIMING: ~75 seconds. DELIVERY: Mention specific TELUS initiatives if researched (check LinkedIn, newsroom). CLARITY: Articulate SOC → GRC bridge. PAUSE: After company context. AUTHENTICITY: Contrast Oasis scale with TELUS (shows growth mindset). CLOSE: Circle back to your role vision. RESEARCH: Check TELUS social media + recent announcements."
            },
            {
                question: "Where do you see yourself in 5 years?",
                answer: "I see myself as a recognized Security Operations Engineer leading blue-team operations at scale.\nIn the immediate term (2–3 years), I want to master threat detection and incident response across cloud and on-prem environments — the core TELUS competencies.\nIn the longer term (5+ years), I want to bridge operations and compliance: designing SOC processes that generate compliance evidence by design, not as an afterthought.\nUltimately, I want to build security awareness programs for organizations, but only after I've earned the credibility of being a working security engineer first. That's why TELUS GTLP is the perfect launch point.",
                keyPoints: [
                    "Near-term (2–3 years): Master threat detection + incident response",
                    "Mid-term (5 years): Lead SOC operations or GRC architecture",
                    "Long-term vision: Security awareness at scale (superpower)",
                    "The bridge: Operations → Awareness (credibility matters)",
                    "TELUS as foundation: Learning + mentorship + scale",
                    "Progression clarity: Role growth, not lateral moves"
                ],
                deliveryNotes: "TIMING: ~60 seconds. DELIVERY: Speak clearly about timeline (near/mid/long term). PAUSE: Between each phase. AUTHENTICITY: Show self-awareness (awareness comes later, after ops credibility). RELEVANCE: Tie back to TELUS (this role builds that path). NO RUSH: Take your time on the progression. EYE CONTACT: Maintain throughout."
            },
            {
                question: "What's your mission as a security professional, and why does TELUS matter to it?",
                answer: "My mission is simple: Make security operational and accessible, not a bottleneck.\nMost organizations treat security as 'compliance checkbox' instead of 'how do we detect and respond to threats efficiently?' I want to build Security Operations Engineer teams that see both sides: how to detect threats in real-time AND how to prove to auditors that those detections prove control.\nTELUS matters because you're a massive organization where I can learn to scale both — operating mature detection at enterprise level while understanding compliance architecture.\nThen, in a few years, I'll teach that integrated model to smaller organizations as a security consultant. That's where I want to create impact.",
                keyPoints: [
                    "Mission: Operational + accessible security (no silos)",
                    "Problem: Organizations see security as compliance checkbox",
                    "Solution: Detection + compliance evidence together",
                    "TELUS role: Learn to scale at enterprise level",
                    "Future impact: Teach this model to SMBs",
                    "Values: Operations-first thinking, compliance integration"
                ],
                deliveryNotes: "TIMING: ~75 seconds. DELIVERY: Speak passionately but measured about mission. CLARITY: Make detection + compliance link crystal clear. PAUSE: After stating mission, before explaining TELUS role. BUILD CONTEXT: 'At Oasis, I saw how small teams...' AUTHENTICITY: This should feel genuine. CLOSE: Circle back to TELUS as the learning bridge to your future impact."
            },
            {
                question: "What would you ask us about this role or TELUS?",
                answer: "I'd ask a few strategic questions:\nQUESTION 1: SOC → Compliance Bridge\n- How does TELUS's SOC structure connect detection workflows to compliance evidence?\n- Are threat alerts fed directly into audit trails or is that a separate process?\n- This shows I understand the critical link between operations and compliance.\nQUESTION 2: Rotation & Career Path\n- What's the relationship between the Threat Detection rotation and GRC/Compliance rotations?\n- Do people move between them, or do they remain specialized?\n- This shows I'm thinking about long-term progression.\nQUESTION 3: Skill Gaps\n- What's the biggest gap you see in Security Operations Engineers coming out of school?\n- Is it tool expertise (Splunk), or is it understanding the compliance/operations bridge?\n- This shows I'm listening to what TELUS actually needs to teach.\nQUESTION 4: Mentorship & Learning\n- How do you mentor technical growth alongside leadership development in GTLP?\n- This shows I value both hands-on skills AND leadership development.",
                keyPoints: [
                    "Question 1: SOC → compliance bridge (your strength area)",
                    "Question 2: Rotation structure + long-term career paths",
                    "Question 3: Gap analysis (what they need to teach you)",
                    "Question 4: Mentorship approach (learning + leadership)",
                    "Meta insight: Questions show strategic, systems-level thinking",
                    "Relevance: Each question ties back to Security Operations Engineer vision"
                ],
                deliveryNotes: "TIMING: ~90 seconds (ask 2–3 questions, not all 4). DELIVERY: Ask these naturally, not as a script. PAUSE: Between each question. LISTEN ACTIVELY: Actually listen to answers, don't plan next question. CLARITY: Make questions specific (not generic 'what's the culture'). AUTHENTICITY: Show genuine curiosity about operations + compliance bridge. CLOSE: Thank them for the conversation and express excitement about the role."
            }
        ];

        let currentIndex = 0;
        let isFlipped = false;

        function loadCard() {
            const card = flashcards[currentIndex];
            document.getElementById('question').textContent = card.question;
            document.getElementById('answer').textContent = card.answer;

            const keyPointsList = document.getElementById('keyPoints');
            keyPointsList.innerHTML = '';
            card.keyPoints.forEach(point => {
                const li = document.createElement('li');
                li.textContent = point;
                keyPointsList.appendChild(li);
            });

            document.getElementById('deliveryNotes').textContent = card.deliveryNotes;
            document.getElementById('cardCounter').textContent = `Card ${currentIndex + 1} of ${flashcards.length}`;

            updateProgress();
            resetFlip();
            updateButtonStates();
        }

        function flipCard() {
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.toggle('flipped');
            isFlipped = !isFlipped;
        }

        function nextCard() {
            if (currentIndex < flashcards.length - 1) {
                currentIndex++;
                loadCard();
            }
        }

        function previousCard() {
            if (currentIndex > 0) {
                currentIndex--;
                loadCard();
            }
        }

        function resetFlip() {
            document.getElementById('flashcard').classList.remove('flipped');
            isFlipped = false;
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / flashcards.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function updateButtonStates() {
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === flashcards.length - 1;
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') previousCard();
            if (e.key === 'ArrowRight') nextCard();
            if (e.key === ' ') {
                e.preventDefault();
                flipCard();
            }
        });

        // Initialize
        loadCard();
    </script>
</body>
</html>
