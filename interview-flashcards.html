<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELUS GTLP Interview Prep - Flashcards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #162d3d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: #10b981;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        .header p {
            font-size: 1.1rem;
            color: #6ee7b7;
            opacity: 0.9;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: #8b5cf6;
            border-radius: 3px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }

        .flashcard-wrapper {
            perspective: 1000px;
            margin-bottom: 30px;
            height: 450px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .flashcard-front {
            background: #162d3d;
            border: 2px solid rgba(139, 92, 246, 0.3);
        }

        .flashcard-back {
            background: #162d3d;
            border: 2px solid rgba(139, 92, 246, 0.3);
            transform: rotateY(180deg);
            overflow-y: auto;
        }

        .flashcard-label {
            font-size: 0.85rem;
            color: #a78bfa;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
        }

        .flashcard-question {
            font-size: 2rem;
            font-weight: 700;
            color: #c4b5fd;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .flashcard-answer {
            font-size: 0.95rem;
            color: #d8d8ff;
            line-height: 1.8;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }

        .key-points {
            background: rgba(139, 92, 246, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 3px solid #8b5cf6;
        }

        .key-points-title {
            font-weight: 700;
            color: #a78bfa;
            margin-bottom: 10px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .key-points-list {
            list-style: none;
            font-size: 0.85rem;
            color: #e9d5ff;
        }

        .key-points-list li {
            padding: 6px 0;
            padding-left: 20px;
            position: relative;
        }

        .key-points-list li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: #a78bfa;
            font-weight: bold;
        }

        .delivery-notes {
            background: rgba(139, 92, 246, 0.08);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 3px solid #a78bfa;
        }

        .delivery-notes-title {
            font-weight: 700;
            color: #a78bfa;
            margin-bottom: 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .delivery-notes-text {
            font-size: 0.85rem;
            color: #e9d5ff;
            line-height: 1.6;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            background: transparent;
            border: 2px solid #8b5cf6;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #a78bfa;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
        }

        button:hover {
            background: rgba(139, 92, 246, 0.1);
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button.primary {
            background: #8b5cf6;
            color: #162d3d;
            border-color: #8b5cf6;
        }

        button.primary:hover {
            background: #7c3aed;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
        }

        button.flip-btn {
            background: #10b981;
            color: #162d3d;
            border-color: #10b981;
        }

        button.flip-btn:hover {
            background: #059669;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.6);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .stats {
            text-align: center;
            color: #a78bfa;
            margin-bottom: 20px;
            font-size: 1rem;
            font-weight: 600;
        }

        .flip-hint {
            text-align: center;
            color: #c4b5fd;
            font-size: 0.9rem;
            margin-top: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .footer {
            text-align: center;
            color: #c4b5fd;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .flashcard-wrapper {
                height: 500px;
            }

            .flashcard-front,
            .flashcard-back {
                padding: 25px;
            }

            .flashcard-question {
                font-size: 1.4rem;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ TELUS GTLP Interview Prep</h1>
            <p>8 Flashcards • Security Operations Engineer Track</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="stats">
            <span id="cardCounter">Card 1 of 8</span>
        </div>

        <div class="flashcard-wrapper">
            <div class="flashcard" id="flashcard" onclick="flipCard()">
                <div class="flashcard-front">
                    <div>
                        <div class="flashcard-label">Question</div>
                        <div class="flashcard-question" id="question"></div>
                    </div>
                    <div class="flip-hint">👆 Click to reveal answer</div>
                </div>
                <div class="flashcard-back">
                    <div>
                        <div class="flashcard-label">Answer</div>
                        <div class="flashcard-answer" id="answer"></div>
                        <div class="key-points" id="keyPointsSection">
                            <div class="key-points-title">Key Talking Points</div>
                            <ul class="key-points-list" id="keyPoints"></ul>
                        </div>
                        <div class="delivery-notes" id="deliveryNotesSection">
                            <div class="delivery-notes-title">💡 Delivery Notes</div>
                            <div class="delivery-notes-text" id="deliveryNotes"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="prevBtn" onclick="previousCard()">← Previous</button>
            <button class="flip-btn" id="flipBtn" onclick="flipCard(); event.stopPropagation();">Flip Card</button>
            <button id="nextBtn" onclick="nextCard()">Next →</button>
        </div>

        <div class="footer">
            <p>Week 1: Foundation Questions + Career Vision</p>
            <p style="opacity: 0.7; margin-top: 8px;">Questions 6-8: Future Vision, Mission Statement, What You Bring</p>
        </div>
    </div>

    <script>
        const flashcards = [
            {
                question: "Tell me about yourself",
                answer: "I'm a recent SANS graduate with honors, and I'm a Security Operations Engineer at a startup where I've built security from the ground up — compliance frameworks, awareness training, the whole foundation. My superpower is security awareness — I've trained 200+ professionals and supported their hands-on learning. I also just started a real web app pentest, and I founded a cybersecurity club at my university that partnered with the CISO of Microsoft Canada and IBM.",
                keyPoints: [
                    "SANS grad + honors (credibility + learning mindset)",
                    "Security Operations Engineer title (SOC + cloud + GRC)",
                    "Built from ground up (ownership + systems thinking)",
                    "200+ trained (proof of superpower)",
                    "Real pentest underway (technical foundation)",
                    "Club + partnerships (leadership + community)"
                ],
                deliveryNotes: "TIMING: ~60 seconds. DELIVERY: Pause between thoughts, natural cadence. BUILD THE STAGE: 'Currently at Oasis, a startup of 8 people...' CLARITY: Speak slower than you think. EYE CONTACT: Look at interviewer, don't rush. Stop talking and let them ask next question."
            },
            {
                question: "What draws you specifically to TELUS and the GTLP program?",
                answer: "TELUS's 9-month rotation structure is exactly what I need. I'm currently working in threat detection, monitoring, and compliance at my startup. I want deeper hands-on experience as a Security Operations Engineer — learning Splunk, understanding how SOC operations feed into GRC requirements, and building expertise across threat detection and cloud security.\nI'm comfortable with monitoring tools and have foundational SIEM knowledge, but enterprise-scale Splunk and understanding how detection connects to compliance evidence is where I want to grow. Your approach to scaling security while building real customer impact aligns with how I want to develop as a leader.",
                keyPoints: [
                    "9-month rotation model (structured learning path)",
                    "Currently: threat detection, monitoring, compliance",
                    "Goal: Security Operations Engineer (not pentesting)",
                    "Tools solid: Monitoring, foundational SIEM",
                    "Honest gaps: Enterprise Splunk, cloud at scale",
                    "TELUS fit: Innovation + customer impact + GRC integration"
                ],
                deliveryNotes: "TIMING: ~75 seconds. DELIVERY: Start with 'So what really drew me...' (conversational). BUILD CONTEXT: 'Currently at Oasis, I monitor alerts and ensure compliance...' CLARITY: Be specific about Splunk + GRC connection. PAUSE: After each section. AUTHENTICITY: Show genuine excitement for SOC operations, not just rotation program."
            },
            {
                question: "Tell me about a time you faced a challenging situation at work (STAR format)",
                answer: "SITUATION:\nWhen I joined Oasis, we had zero security training and no compliance framework. The team was distributed, and there was no way to prove to auditors that we were security-aware.\nTASK:\nResearch solutions that would work for a distributed team and create measurable compliance evidence.\nACTION:\n- Evaluated platforms to find the right fit for remote teams\n- Chose Watchdog Security (tracked participation + compliance proof)\n- Designed the security awareness curriculum\n- Made training mandatory for all employees\n- Tracked participation metrics and compliance evidence\nRESULT:\n- Went from 0% to 93% participation in Q1 (exceptional for distributed team)\n- Generated proof of security awareness training\n- Became part of our ISO 27001 compliance evidence\n- Showed auditors we had formalized security awareness controls",
                keyPoints: [
                    "Situation: Zero training + compliance proof gap",
                    "Task: Find solution for distributed team",
                    "Action: Evaluated tools, chose Watchdog, designed curriculum",
                    "Result: 93% participation + compliance evidence collected",
                    "Shows SOC → GRC connection (alerts prove control)",
                    "Demonstrates systems thinking (tool + process + measurement)"
                ],
                deliveryNotes: "TIMING: ~90 seconds. DELIVERY: Build the stage — 'When I joined Oasis in November...' CLARITY: Make Watchdog + compliance proof explicit. PAUSE: Between STAR sections. RELEVANCE: Emphasize how this ties to TELUS (SOC operations generate compliance evidence). EYE CONTACT: Maintain throughout. NO RUSH: Slow down on the result."
            },
            {
                question: "What's one area you want to grow technically?",
                answer: "Splunk. I have foundational SIEM knowledge from monitoring at my startup, but Splunk is the enterprise standard I want to master. More importantly, I want to understand how Splunk alerts feed into compliance and incident response workflows — the bridge between SOC operations and GRC. That's exactly what the 9-month rotation in threat detection will give me: hands-on Splunk experience AND understanding how detection ties to compliance evidence, which is critical for enterprise security.",
                keyPoints: [
                    "Pick Splunk (realistic + TELUS-relevant)",
                    "Explain WHY: Enterprise standard + GRC bridge",
                    "Show self-awareness: 'I have foundational knowledge but...'",
                    "Connect to TELUS: 'This rotation gives me exactly...'",
                    "Growth mindset: Eager to learn AND understand strategy",
                    "Frame as opportunity, not weakness"
                ],
                deliveryNotes: "TIMING: ~60 seconds. DELIVERY: Speak clearly about Splunk + GRC connection. PAUSE: After naming Splunk, before explaining why. AUTHENTICITY: Show genuine enthusiasm for SOC operations. REFERENCE: 'At Oasis, we use basic SIEM...' (ground it in experience). CLOSE: End with how rotation helps."
            },
            {
                question: "What's your understanding of TELUS and why you're a fit?",
                answer: "TELUS is Canada's leading telecom company pioneering digital transformation. What attracted me to GTLP is your commitment to building security operations at scale while maintaining compliance — from cloud infrastructure security to threat detection to GRC.\nI've seen firsthand at Oasis how small teams struggle to do this alone. TELUS's scale means I'll work with enterprise-level Splunk, cloud security at scale, and mature compliance frameworks like you're likely operating under.\nThat aligns perfectly with where I want to develop: becoming a Security Operations Engineer who understands the entire security stack from detection through compliance evidence.",
                keyPoints: [
                    "Company context: Telecom leader + digital transformation",
                    "GTLP appeal: Scale + structured rotations + mentorship",
                    "Research shown: Security + compliance + cloud operations",
                    "Your fit: Ready to learn at enterprise scale",
                    "Vision: Security Operations Engineer (SOC → GRC bridge)",
                    "Authentic connection: Small startup → enterprise growth"
                ],
                deliveryNotes: "TIMING: ~75 seconds. DELIVERY: Mention specific TELUS initiatives if researched (check LinkedIn, newsroom). CLARITY: Articulate SOC → GRC bridge. PAUSE: After company context. AUTHENTICITY: Contrast Oasis scale with TELUS (shows growth mindset). CLOSE: Circle back to your role vision. RESEARCH: Check TELUS social media + recent announcements."
            },
            {
                question: "Where do you see yourself in 5 years?",
                answer: "I see myself as a recognized Security Operations Engineer leading blue-team operations at scale.\nIn the immediate term (2–3 years), I want to master threat detection and incident response across cloud and on-prem environments — the core TELUS competencies.\nIn the longer term (5+ years), I want to bridge operations and compliance: designing SOC processes that generate compliance evidence by design, not as an afterthought.\nUltimately, I want to build security awareness programs for organizations, but only after I've earned the credibility of being a working security engineer first. That's why TELUS GTLP is the perfect launch point.",
                keyPoints: [
                    "Near-term (2–3 years): Master threat detection + incident response",
                    "Mid-term (5 years): Lead SOC operations or GRC architecture",
                    "Long-term vision: Security awareness at scale (superpower)",
                    "The bridge: Operations → Awareness (credibility matters)",
                    "TELUS as foundation: Learning + mentorship + scale",
                    "Progression clarity: Role growth, not lateral moves"
                ],
                deliveryNotes: "TIMING: ~60 seconds. DELIVERY: Speak clearly about timeline (near/mid/long term). PAUSE: Between each phase. AUTHENTICITY: Show self-awareness (awareness comes later, after ops credibility). RELEVANCE: Tie back to TELUS (this role builds that path). NO RUSH: Take your time on the progression. EYE CONTACT: Maintain throughout."
            },
            {
                question: "What's your mission as a security professional, and why does TELUS matter to it?",
                answer: "My mission is simple: Make security operational and accessible, not a bottleneck.\nMost organizations treat security as 'compliance checkbox' instead of 'how do we detect and respond to threats efficiently?' I want to build Security Operations Engineer teams that see both sides: how to detect threats in real-time AND how to prove to auditors that those detections prove control.\nTELUS matters because you're a massive organization where I can learn to scale both — operating mature detection at enterprise level while understanding compliance architecture.\nThen, in a few years, I'll teach that integrated model to smaller organizations as a security consultant. That's where I want to create impact.",
                keyPoints: [
                    "Mission: Operational + accessible security (no silos)",
                    "Problem: Organizations see security as compliance checkbox",
                    "Solution: Detection + compliance evidence together",
                    "TELUS role: Learn to scale at enterprise level",
                    "Future impact: Teach this model to SMBs",
                    "Values: Operations-first thinking, compliance integration"
                ],
                deliveryNotes: "TIMING: ~75 seconds. DELIVERY: Speak passionately but measured about mission. CLARITY: Make detection + compliance link crystal clear. PAUSE: After stating mission, before explaining TELUS role. BUILD CONTEXT: 'At Oasis, I saw how small teams...' AUTHENTICITY: This should feel genuine. CLOSE: Circle back to TELUS as the learning bridge to your future impact."
            },
            {
                question: "What would you ask us about this role or TELUS?",
                answer: "I'd ask a few strategic questions:\nQUESTION 1: SOC → Compliance Bridge\n- How does TELUS's SOC structure connect detection workflows to compliance evidence?\n- Are threat alerts fed directly into audit trails or is that a separate process?\n- This shows I understand the critical link between operations and compliance.\nQUESTION 2: Rotation & Career Path\n- What's the relationship between the Threat Detection rotation and GRC/Compliance rotations?\n- Do people move between them, or do they remain specialized?\n- This shows I'm thinking about long-term progression.\nQUESTION 3: Skill Gaps\n- What's the biggest gap you see in Security Operations Engineers coming out of school?\n- Is it tool expertise (Splunk), or is it understanding the compliance/operations bridge?\n- This shows I'm listening to what TELUS actually needs to teach.\nQUESTION 4: Mentorship & Learning\n- How do you mentor technical growth alongside leadership development in GTLP?\n- This shows I value both hands-on skills AND leadership development.",
                keyPoints: [
                    "Question 1: SOC → compliance bridge (your strength area)",
                    "Question 2: Rotation structure + long-term career paths",
                    "Question 3: Gap analysis (what they need to teach you)",
                    "Question 4: Mentorship approach (learning + leadership)",
                    "Meta insight: Questions show strategic, systems-level thinking",
                    "Relevance: Each question ties back to Security Operations Engineer vision"
                ],
                deliveryNotes: "TIMING: ~90 seconds (ask 2–3 questions, not all 4). DELIVERY: Ask these naturally, not as a script. PAUSE: Between each question. LISTEN ACTIVELY: Actually listen to answers, don't plan next question. CLARITY: Make questions specific (not generic 'what's the culture'). AUTHENTICITY: Show genuine curiosity about operations + compliance bridge. CLOSE: Thank them for the conversation and express excitement about the role."
            }
        ];

        let currentIndex = 0;
        let isFlipped = false;

        function loadCard() {
            const card = flashcards[currentIndex];
            document.getElementById('question').textContent = card.question;
            document.getElementById('answer').textContent = card.answer;

            const keyPointsList = document.getElementById('keyPoints');
            keyPointsList.innerHTML = '';
            card.keyPoints.forEach(point => {
                const li = document.createElement('li');
                li.textContent = point;
                keyPointsList.appendChild(li);
            });

            document.getElementById('deliveryNotes').textContent = card.deliveryNotes;
            document.getElementById('cardCounter').textContent = `Card ${currentIndex + 1} of ${flashcards.length}`;

            updateProgress();
            resetFlip();
            updateButtonStates();
        }

        function flipCard() {
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.toggle('flipped');
            isFlipped = !isFlipped;
        }

        function nextCard() {
            if (currentIndex < flashcards.length - 1) {
                currentIndex++;
                loadCard();
            }
        }

        function previousCard() {
            if (currentIndex > 0) {
                currentIndex--;
                loadCard();
            }
        }

        function resetFlip() {
            document.getElementById('flashcard').classList.remove('flipped');
            isFlipped = false;
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / flashcards.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function updateButtonStates() {
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === flashcards.length - 1;
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') previousCard();
            if (e.key === 'ArrowRight') nextCard();
            if (e.key === ' ') {
                e.preventDefault();
                flipCard();
            }
        });

        // Initialize
        loadCard();
    </script>
</body>
</html>
