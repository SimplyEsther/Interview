<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Prep - Flashcards</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #162d3d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container { max-width: 900px; width: 100%; }

        /* ── Shared Header ── */
        .header {
            text-align: center;
            color: #10b981;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
        .header p {
            font-size: 1.1rem;
            color: #6ee7b7;
            opacity: 0.9;
        }

        /* ══════════════════════════════
           HOME SCREEN — category cards
        ══════════════════════════════ */
        #homeScreen { display: block; }
        #deckScreen  { display: none;  }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }

        .category-card {
            background: #1a3347;
            border: 2px solid rgba(139, 92, 246, 0.25);
            border-radius: 14px;
            padding: 28px 24px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .category-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--accent);
            opacity: 0.8;
        }
        .category-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }
        .category-card:active { transform: translateY(0); }

        .cat-icon { font-size: 2rem; margin-bottom: 12px; }

        .cat-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: #c4b5fd;
            margin-bottom: 6px;
        }

        .cat-count {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .cat-desc {
            font-size: 0.85rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 14px;
        }

        .cat-pills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .pill {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 10px;
            letter-spacing: 0.5px;
        }
        .pill-conceptual {
            background: rgba(16, 185, 129, 0.12);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .pill-scenario {
            background: rgba(245, 158, 11, 0.12);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .pill-behavioural {
            background: rgba(139, 92, 246, 0.12);
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .cat-arrow {
            position: absolute;
            bottom: 22px; right: 22px;
            font-size: 1.2rem;
            color: var(--accent);
            opacity: 0.6;
            transition: opacity 0.2s, transform 0.2s;
        }
        .category-card:hover .cat-arrow {
            opacity: 1;
            transform: translateX(3px);
        }

        /* ══════════════════════════════
           DECK SCREEN — flashcards
        ══════════════════════════════ */

        /* Back button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: 2px solid rgba(139, 92, 246, 0.35);
            padding: 8px 18px;
            border-radius: 24px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            color: #a78bfa;
            transition: all 0.2s;
            margin-bottom: 28px;
        }
        .back-btn:hover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            transform: translateX(-2px);
            box-shadow: none;
        }

        /* Deck header (category name + card count) */
        .deck-header {
            text-align: center;
            margin-bottom: 6px;
        }
        .deck-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #c4b5fd;
            margin-bottom: 4px;
        }
        .deck-subtitle {
            font-size: 0.9rem;
            color: #6ee7b7;
            margin-bottom: 20px;
        }

        /* Progress */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .progress-fill {
            height: 100%;
            background: #8b5cf6;
            border-radius: 3px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }

        .stats {
            text-align: center;
            color: #a78bfa;
            margin-bottom: 20px;
            font-size: 1rem;
            font-weight: 600;
        }

        /* Flashcard */
        .flashcard-wrapper {
            perspective: 1000px;
            margin-bottom: 28px;
            height: 460px;
        }
        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flashcard.flipped { transform: rotateY(180deg); }

        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 38px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .flashcard-front {
            background: #162d3d;
            border: 2px solid rgba(139, 92, 246, 0.3);
        }
        .flashcard-back {
            background: #162d3d;
            border: 2px solid rgba(139, 92, 246, 0.3);
            transform: rotateY(180deg);
            overflow-y: auto;
        }

        .flashcard-label {
            font-size: 0.8rem;
            color: #a78bfa;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
        }
        .card-type-badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 3px 10px;
            border-radius: 12px;
            margin-bottom: 14px;
        }
        .badge-conceptual { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
        .badge-scenario   { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
        .badge-behavioural{ background: rgba(139,92,246,0.12); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }

        .flashcard-question {
            font-size: 1.75rem;
            font-weight: 700;
            color: #c4b5fd;
            line-height: 1.4;
            margin-bottom: 20px;
        }
        .flashcard-answer {
            font-size: 0.92rem;
            color: #d8d8ff;
            line-height: 1.8;
            margin-bottom: 16px;
            white-space: pre-wrap;
        }

        .key-points {
            background: rgba(139,92,246,0.05);
            padding: 14px;
            border-radius: 8px;
            margin-top: 14px;
            border-left: 3px solid #8b5cf6;
        }
        .key-points-title {
            font-weight: 700; color: #a78bfa;
            margin-bottom: 8px; font-size: 0.82rem;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .key-points-list { list-style: none; font-size: 0.83rem; color: #e9d5ff; }
        .key-points-list li { padding: 5px 0 5px 20px; position: relative; }
        .key-points-list li:before { content: "→"; position: absolute; left: 0; color: #a78bfa; font-weight: bold; }

        .delivery-notes {
            background: rgba(139,92,246,0.08);
            padding: 14px; border-radius: 8px;
            margin-top: 14px; border-left: 3px solid #a78bfa;
        }
        .delivery-notes-title {
            font-weight: 700; color: #a78bfa;
            margin-bottom: 6px; font-size: 0.82rem;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .delivery-notes-text { font-size: 0.83rem; color: #e9d5ff; line-height: 1.6; }

        .flip-hint {
            text-align: center; color: #c4b5fd;
            font-size: 0.9rem; margin-top: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:.7} 50%{opacity:1} }

        /* Controls */
        .controls {
            display: flex; gap: 14px;
            justify-content: center;
            margin-bottom: 20px; flex-wrap: wrap;
        }
        button {
            background: transparent;
            border: 2px solid #8b5cf6;
            padding: 11px 22px; border-radius: 8px;
            font-size: 0.95rem; font-weight: 600;
            cursor: pointer; color: #a78bfa;
            transition: all 0.25s ease;
            box-shadow: 0 0 15px rgba(139,92,246,0.2);
        }
        button:hover {
            background: rgba(139,92,246,0.1);
            box-shadow: 0 0 25px rgba(139,92,246,0.4);
            transform: translateY(-2px);
        }
        button:active { transform: translateY(0); }
        button.flip-btn { background: #10b981; color: #162d3d; border-color: #10b981; }
        button.flip-btn:hover { background: #059669; box-shadow: 0 0 30px rgba(16,185,129,0.6); }
        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .footer {
            text-align: center; color: #c4b5fd;
            font-size: 0.82rem; opacity: 0.6; margin-top: 8px;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.9rem; }
            .category-grid { grid-template-columns: 1fr; }
            .flashcard-wrapper { height: 520px; }
            .flashcard-front, .flashcard-back { padding: 24px; }
            .flashcard-question { font-size: 1.3rem; }
            .controls { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ══ HOME SCREEN ══ -->
    <div id="homeScreen">
        <div class="header">
            <h1>✨ Interview Prep</h1>
            <p>Security Operations Engineer • 32 Cards across 5 decks</p>
        </div>

        <div class="category-grid" id="categoryGrid"></div>
    </div>

    <!-- ══ DECK SCREEN ══ -->
    <div id="deckScreen">
        <button class="back-btn" onclick="goHome()">← Back to Categories</button>

        <div class="deck-header">
            <div class="deck-title" id="deckTitle"></div>
            <div class="deck-subtitle" id="deckSubtitle"></div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="stats">
            <span id="cardCounter">Card 1 of 8</span>
        </div>

        <div class="flashcard-wrapper">
            <div class="flashcard" id="flashcard" onclick="flipCard()">
                <div class="flashcard-front">
                    <div>
                        <div class="flashcard-label">Question</div>
                        <div id="cardTypeBadge"></div>
                        <div class="flashcard-question" id="question"></div>
                    </div>
                    <div class="flip-hint">👆 Click to reveal answer</div>
                </div>
                <div class="flashcard-back">
                    <div>
                        <div class="flashcard-label">Answer</div>
                        <div class="flashcard-answer" id="answer"></div>
                        <div class="key-points">
                            <div class="key-points-title">Key Talking Points</div>
                            <ul class="key-points-list" id="keyPoints"></ul>
                        </div>
                        <div class="delivery-notes">
                            <div class="delivery-notes-title">💡 Delivery Notes</div>
                            <div class="delivery-notes-text" id="deliveryNotes"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="prevBtn" onclick="previousCard()">← Previous</button>
            <button class="flip-btn" onclick="flipCard(); event.stopPropagation();">Flip Card</button>
            <button id="nextBtn" onclick="nextCard()">Next →</button>
        </div>

        <div class="footer">⌨️ Arrow keys to navigate · Spacebar to flip</div>
    </div>

</div>

<script>
    /* ═══════════════════════════════════════════════
       CATEGORY META
    ═══════════════════════════════════════════════ */
    const categoryMeta = [
        {
            key: 'behavioural',
            icon: '🎯',
            name: 'Behavioural',
            accent: '#a78bfa',
            desc: 'TELUS GTLP-specific: Tell me about yourself, why TELUS, STAR stories, mission, and closing questions.',
            pills: ['behavioural'],
            pillLabels: { behavioural: '8 Behavioural' }
        },
        {
            key: 'soc',
            icon: '🛡️',
            name: 'SOC / Incident Response',
            accent: '#10b981',
            desc: 'SIEM monitoring, IR phases, alert triage, threat hunting vs reactive monitoring, and live incident scenarios.',
            pills: ['conceptual', 'scenario'],
            pillLabels: { conceptual: '3 Conceptual', scenario: '3 Scenario' }
        },
        {
            key: 'grc',
            icon: '📋',
            name: 'GRC / Audit & Compliance',
            accent: '#60a5fa',
            desc: 'ISO 27001, NIST CSF, PCI-DSS, risk assessments, policy hierarchy, and audit evidence walkthroughs.',
            pills: ['conceptual', 'scenario'],
            pillLabels: { conceptual: '3 Conceptual', scenario: '3 Scenario' }
        },
        {
            key: 'infrastructure',
            icon: '☁️',
            name: 'Infrastructure / Cloud',
            accent: '#f472b6',
            desc: 'Shared responsibility model, Azure AD vs on-prem AD, Terraform/DevSecOps, Docker security, and least privilege.',
            pills: ['conceptual', 'scenario'],
            pillLabels: { conceptual: '4 Conceptual', scenario: '2 Scenario' }
        },
        {
            key: 'appsec',
            icon: '🔐',
            name: 'AppSec / Pentesting',
            accent: '#f59e0b',
            desc: 'Pentest methodology, OWASP Top 3, SAST vs DAST, SQL injection, IDOR handling, and WAF misconceptions.',
            pills: ['conceptual', 'scenario'],
            pillLabels: { conceptual: '3 Conceptual', scenario: '3 Scenario' }
        }
    ];

    /* ═══════════════════════════════════════════════
       FLASHCARD DATA
    ═══════════════════════════════════════════════ */
    const allCards = {
        behavioural: [
            {
                type: "behavioural",
                question: "Tell me about yourself",
                answer: "I'm a recent SANS graduate with honors and currently work as a Security Operations Engineer at Oasis, a software startup where I'm building the security culture from the ground up — compliance frameworks, security awareness training, and this quarter, web application pen testing on our products before they ship.\n\nI currently work as a cybersecurity TA, but before that I was the lead cybersecurity instructor for three years at Brock's Cybersecurity Club, where I partnered with the CISO of Microsoft Canada and trained 140+ students. Right now I'm training 200+ Amazon employees for their Security Plus certification.\n\nMy superpower is security awareness training — and here's the proof: at Oasis, we went from zero participation to 93% in Q1, which is exceptional for a distributed team. Whether it's building compliance frameworks, instructing students, or training professionals, security awareness shows up in everything I do.",
                keyPoints: [
                    "SANS grad with honors (credibility + learning mindset)",
                    "Security Operations Engineer at Oasis (SOC + GRC + pentesting)",
                    "Built security culture from ground up (ownership + systems thinking)",
                    "Lead instructor 3 years @ Brock + CISO of Microsoft Canada partnership",
                    "Training 200+ Amazon employees for Security Plus",
                    "93% participation Q1 — proof of superpower"
                ],
                deliveryNotes: "TIMING: ~60–75 seconds. DELIVERY: Conversational — you're telling a story, not reciting. BUILD THE STAGE: Set context at Oasis early. HIGHLIGHT: The 93% stat is your anchor — pause before delivering it. EYE CONTACT: Look at interviewer, don't rush. Let them ask the next question."
            },
            {
                type: "behavioural",
                question: "What draws you specifically to TELUS and the GTLP program?",
                answer: "What really drew me to TELUS GTLP was the 9-month rotation structure — specifically Threat Detection & Incident Response, DevSecOps, and Cloud Security. I've been watching the TELUS job board closely, and this is exactly what I need at this stage of my career.\n\nI'm a GSOC and GSEC certified engineer, and most of my experience has been blue team — threat detection and monitoring at Oasis. I have foundational SIEM knowledge from OpenSearch and Elasticsearch, but those are open-source tools. Enterprise tools like Splunk are where I really want to go.\n\nI want deeper hands-on experience with cloud security — AWS and Azure — and understanding how to embed security from the start through DevSecOps. TELUS's approach to scaling security while building real customer impact aligns directly with how I want to develop as a leader.",
                keyPoints: [
                    "9-month rotation model (Threat Detection, DevSecOps, Cloud Security)",
                    "GSOC + GSEC certified (credibility in blue team ops)",
                    "Currently: threat detection + monitoring at Oasis (blue team)",
                    "Current tools: OpenSearch + Elasticsearch (open-source SIEM)",
                    "Goals: Enterprise Splunk, AWS/Azure cloud security, DevSecOps",
                    "TELUS fit: Scale + customer impact + leadership development"
                ],
                deliveryNotes: "TIMING: ~75 seconds. DELIVERY: Start conversationally — 'So what really drew me...' SPECIFICITY: Name the three rotation areas explicitly. HONESTY: Acknowledge open-source vs enterprise gap — it shows self-awareness. ENTHUSIASM: Let genuine excitement about Splunk + cloud come through. CLOSE: End on leadership development."
            },
            {
                type: "behavioural",
                question: "Tell me about a time you faced a challenging situation at work (STAR format)",
                answer: "SITUATION:\nWhen I joined Oasis as a Security Engineer, we had zero security infrastructure — no policies, no compliance framework, no training for the distributed team of developers. There was no way to prove to auditors we were security-aware.\n\nTASK:\nBuild a security culture from the ground up — develop policies, evaluate and implement security tools, and create measurable compliance evidence for all employees.\n\nACTION:\n• Developed security policies based on industry standards: email policy, password policy, data retention, and more — creating a documented baseline\n• Evaluated security platforms on 4 criteria: compatibility with our tech stack, cost-effectiveness (startup budget), vendor reputation, and scalability\n• Selected Watchdog Security — met all 4 criteria, centralized compliance monitoring, simplified risk assessments, full visibility into user identities\n• Designed role-based security awareness training: AI security practices for developers, general awareness for all staff — made it mandatory\n• Tracked participation and compliance metrics throughout the quarter\n\nRESULT:\n• Went from 0% to 93% participation in Q1 — exceptional for a distributed team\n• Generated proof of security awareness training\n• Documented all policies and created a compliance evidence package\n• Put the company on track for ISO 27001 compliance — all within three months.",
                keyPoints: [
                    "Situation: Zero security infrastructure at a distributed startup",
                    "Task: Build full security culture from scratch",
                    "Action: Policies → tool evaluation (4 criteria) → Watchdog → training",
                    "Result: 0% → 93% participation + ISO 27001 compliance track",
                    "Shows end-to-end ownership (policy + tooling + training + measurement)",
                    "Demonstrates systems thinking across GRC, tools, and awareness"
                ],
                deliveryNotes: "TIMING: ~90 seconds. DELIVERY: Build the stage — 'When they brought me on board, we had zero...' PAUSE: Between each STAR section. SLOW DOWN: On the result — let 93% land. SPECIFICITY: Name the 4 evaluation criteria — it shows rigor. CONNECT: Tie to ISO 27001 at the end for enterprise relevance."
            },
            {
                type: "behavioural",
                question: "What's one area you want to grow technically?",
                answer: "Right now I'm looking to grow my SIEM and blue team tool stack — specifically Splunk.\n\nI have foundational SIEM knowledge from OpenSearch and Elasticsearch at Oasis, and from LetsDefend and my GSOC training. But Splunk is the enterprise standard I really want to master.\n\nIt's actually one of the things that drew me to TELUS GTLP — Splunk is a core tool in the Threat Detection and Incident Response rotation, which I'm most excited about. I'm not just eager to learn Splunk itself, but to understand how to architect SIEM environments at scale and how detection feeds into security operations at an enterprise level.",
                keyPoints: [
                    "Pick: Splunk (enterprise SIEM standard — TELUS-relevant)",
                    "Foundation: OpenSearch + Elasticsearch at Oasis + LetsDefend + GSOC",
                    "Honest gap: Open-source experience vs enterprise-scale Splunk",
                    "Connect to TELUS: Core tool in Threat Detection rotation",
                    "Bigger vision: Architect SIEM environments + understand detection at scale",
                    "Growth mindset: Skill + strategy, not just tool knowledge"
                ],
                deliveryNotes: "TIMING: ~60 seconds. DELIVERY: Name Splunk clearly and early. PAUSE: After naming it, before explaining why. AUTHENTICITY: Show genuine excitement — this isn't a rehearsed weakness, it's real ambition. GROUND IT: Reference your existing SIEM foundation to show you're not starting from zero. CLOSE: End on the bigger vision (architecting at scale)."
            },
            {
                type: "behavioural",
                question: "What's your understanding of TELUS and why you're a fit?",
                answer: "TELUS is Canada's leading telecom company pioneering digital transformation. What attracted me to GTLP is your commitment to building security operations at scale while maintaining compliance — from cloud infrastructure security to threat detection to GRC.\n\nI've seen firsthand at Oasis how small teams struggle to do this alone. TELUS's scale means I'll work with enterprise-level Splunk, cloud security at scale, and mature compliance frameworks.\n\nThat aligns perfectly with where I want to develop: becoming a Security Operations Engineer who understands the entire security stack from detection through compliance evidence.",
                keyPoints: [
                    "Company context: Telecom leader + digital transformation",
                    "GTLP appeal: Scale + structured rotations + mentorship",
                    "Research shown: Security + compliance + cloud operations",
                    "Your fit: Ready to learn at enterprise scale",
                    "Vision: Security Operations Engineer (SOC → GRC bridge)",
                    "Authentic connection: Small startup → enterprise growth"
                ],
                deliveryNotes: "TIMING: ~75 seconds. DELIVERY: Mention specific TELUS initiatives if researched (check LinkedIn, newsroom). CLARITY: Articulate SOC → GRC bridge. PAUSE: After company context. AUTHENTICITY: Contrast Oasis scale with TELUS (shows growth mindset). CLOSE: Circle back to your role vision."
            },
            {
                type: "behavioural",
                question: "Where do you see yourself in 5 years?",
                answer: "I see myself as a recognized Security Operations Engineer leading blue-team operations at scale.\n\nIn the immediate term (2–3 years), I want to master threat detection and incident response across cloud and on-prem environments — the core TELUS competencies.\n\nIn the longer term (5+ years), I want to bridge operations and compliance: designing SOC processes that generate compliance evidence by design, not as an afterthought.\n\nUltimately, I want to build security awareness programs for organizations — but only after I've earned the credibility of being a working security engineer first. That's why TELUS GTLP is the perfect launch point.",
                keyPoints: [
                    "Near-term (2–3 years): Master threat detection + incident response",
                    "Mid-term (5 years): Lead SOC operations or GRC architecture",
                    "Long-term vision: Security awareness at scale (superpower)",
                    "The bridge: Operations → Awareness (credibility matters)",
                    "TELUS as foundation: Learning + mentorship + scale",
                    "Progression clarity: Role growth, not lateral moves"
                ],
                deliveryNotes: "TIMING: ~60 seconds. DELIVERY: Speak clearly about timeline (near/mid/long term). PAUSE: Between each phase. AUTHENTICITY: Show self-awareness (awareness comes later, after ops credibility). RELEVANCE: Tie back to TELUS (this role builds that path). NO RUSH: Take your time on the progression."
            },
            {
                type: "behavioural",
                question: "What's your mission as a security professional, and why does TELUS matter to it?",
                answer: "My mission is simple: Make security operational and accessible — not a bottleneck.\n\nMost organizations treat security as a 'compliance checkbox' instead of asking 'how do we detect and respond to threats efficiently?' I want to build Security Operations Engineer teams that see both sides: how to detect threats in real-time AND how to prove to auditors that those detections prove control.\n\nTELUS matters because you're a massive organization where I can learn to scale both — operating mature detection at enterprise level while understanding compliance architecture.\n\nThen, in a few years, I'll teach that integrated model to smaller organizations. That's where I want to create real impact.",
                keyPoints: [
                    "Mission: Operational + accessible security (no silos)",
                    "Problem: Organizations see security as compliance checkbox",
                    "Solution: Detection + compliance evidence together",
                    "TELUS role: Learn to scale at enterprise level",
                    "Future impact: Teach this model to SMBs",

    /* ═══════════════════════════════════════════════

    let currentCategory = null;
    let currentDeck     = [];
    let currentIndex    = 0;

    /* ═══════════════════════════════════════════════
       BUILD HOME SCREEN
    ═══════════════════════════════════════════════ */
    function buildHome() {
        const grid = document.getElementById('categoryGrid');
        grid.innerHTML = '';
        categoryMeta.forEach(meta => {
            const count = allCards[meta.key].length;
            const pillsHTML = meta.pills.map(p =>
                `<span class="pill pill-${p}">${meta.pillLabels[p]}</span>`
            ).join('');

            const card = document.createElement('div');
            card.className = 'category-card';
            card.style.setProperty('--accent', meta.accent);
            card.innerHTML = `
                <div class="cat-icon">${meta.icon}</div>
                <div class="cat-name">${meta.name}</div>
                <div class="cat-count">${count} Cards</div>
                <div class="cat-desc">${meta.desc}</div>
                <div class="cat-pills">${pillsHTML}</div>
                <div class="cat-arrow">→</div>
            `;
            card.addEventListener('click', () => openDeck(meta.key));
            grid.appendChild(card);
        });
    }

    /* ═══════════════════════════════════════════════
       NAVIGATION
    ═══════════════════════════════════════════════ */
    function openDeck(categoryKey) {
        currentCategory = categoryKey;
        currentDeck     = allCards[categoryKey];
        currentIndex    = 0;

        const meta = categoryMeta.find(m => m.key === categoryKey);
        document.getElementById('deckTitle').textContent    = `${meta.icon} ${meta.name}`;
        document.getElementById('deckSubtitle').textContent = `${currentDeck.length} Cards`;

        document.getElementById('homeScreen').style.display = 'none';
        document.getElementById('deckScreen').style.display = 'block';
        loadCard();
    }

    function goHome() {
        document.getElementById('deckScreen').style.display = 'none';
        document.getElementById('homeScreen').style.display = 'block';
        resetFlip();
    }

    /* ═══════════════════════════════════════════════
       CARD LOGIC
    ═══════════════════════════════════════════════ */
    function loadCard() {
        const card = currentDeck[currentIndex];

        document.getElementById('question').textContent = card.question;
        document.getElementById('answer').textContent   = card.answer;

        // Badge
        const badge = document.getElementById('cardTypeBadge');
        if (card.type === 'scenario') {
            badge.innerHTML = '<span class="card-type-badge badge-scenario">⚡ Scenario-Based</span>';
        } else if (card.type === 'conceptual') {
            badge.innerHTML = '<span class="card-type-badge badge-conceptual">📚 Conceptual</span>';
        } else {
            badge.innerHTML = '<span class="card-type-badge badge-behavioural">🎯 Behavioural</span>';
        }

        // Key points
        const list = document.getElementById('keyPoints');
        list.innerHTML = '';
        card.keyPoints.forEach(pt => {
            const li = document.createElement('li');
            li.textContent = pt;
            list.appendChild(li);
        });

        document.getElementById('deliveryNotes').textContent = card.deliveryNotes;
        document.getElementById('cardCounter').textContent   =
            `Card ${currentIndex + 1} of ${currentDeck.length}`;

        updateProgress();
        resetFlip();
        updateButtons();
    }

    function flipCard() {
        document.getElementById('flashcard').classList.toggle('flipped');
    }
    function nextCard() {
        if (currentIndex < currentDeck.length - 1) { currentIndex++; loadCard(); }
    }
    function previousCard() {
        if (currentIndex > 0) { currentIndex--; loadCard(); }
    }
    function resetFlip() {
        document.getElementById('flashcard').classList.remove('flipped');
    }
    function updateProgress() {
        const pct = ((currentIndex + 1) / currentDeck.length) * 100;
        document.getElementById('progressFill').style.width = pct + '%';
    }
    function updateButtons() {
        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === currentDeck.length - 1;
    }

    // Keyboard nav (only active when a deck is open)
    document.addEventListener('keydown', e => {
        if (document.getElementById('deckScreen').style.display === 'none') return;
        if (e.key === 'ArrowLeft')  previousCard();
        if (e.key === 'ArrowRight') nextCard();
        if (e.key === ' ') { e.preventDefault(); flipCard(); }
    });

    // Init
    buildHome();
</script>
